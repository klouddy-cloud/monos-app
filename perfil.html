<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monos — Perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --mint: #A8E6CF;
  --mint-light: #D4F5E6;
  --lilac: #C3B1E1;
  --lilac-light: #E8DEFF;
  --yellow: #FFEAA7;
  --yellow-light: #FFF8DC;
  --pink: #FFB7C5;
  --pink-light: #FFE0E8;
  --orange: #FFD4A8;
  --bg: #FAFBFC;
  --card: #FFFFFF;
  --text: #1A1A2E;
  --text-secondary: #6B7280;
  --border: #F0F0F5;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --radius: 20px;
  --radius-sm: 14px;
  --tab-height: 72px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  width: 100vw;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: var(--tab-height);
  overflow-x: hidden;
}

/* HEADER */
.profile-header {
  padding: 20px 24px 0;
  display: flex;
  justify-content: flex-end;
  align-items: center;
}
.settings-btn {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; text-decoration: none;
  box-shadow: var(--shadow);
}

/* PROFILE INFO */
.profile-info {
  display: flex; flex-direction: column;
  align-items: center; padding: 20px 24px 8px;
}
.profile-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 800; color: #fff;
  margin-bottom: 12px;
}
.profile-name { font-size: 22px; font-weight: 800; }
.profile-sub { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-top: 2px; }

/* CONTENT */
.profile-content { padding: 24px; }

/* STATS GRID */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 20px;
}
.stat-card {
  background: var(--card); border-radius: var(--radius-sm);
  padding: 20px 16px; text-align: center;
  box-shadow: var(--shadow);
}
.stat-card.accent {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
}
.stat-value { font-size: 28px; font-weight: 800; line-height: 1.2; }
.stat-card.accent .stat-label { color: rgba(255,255,255,.8); }
.stat-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-top: 4px; }

/* RADAR CARD */
.radar-card {
  background: var(--card); border-radius: var(--radius);
  padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px;
}
.radar-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
.radar-wrap { display: flex; justify-content: center; }

/* BADGES */
.badges-card {
  background: var(--card); border-radius: var(--radius);
  padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px;
}
.badges-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
.badges-grid {
  display: flex; gap: 10px; overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.badges-grid::-webkit-scrollbar { display: none; }
.badge-item {
  min-width: 80px; padding: 14px 10px;
  border-radius: var(--radius-sm); text-align: center;
  flex-shrink: 0;
}
.badge-item.locked { background: #F0F0F5; opacity: .4; }
.badge-emoji { font-size: 28px; margin-bottom: 6px; }
.badge-name { font-size: 11px; font-weight: 700; color: var(--text); }

/* TAB BAR */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--tab-height);
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; z-index: 80;
  padding-bottom: env(safe-area-inset-bottom);
  max-width: 430px; margin: 0 auto;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; text-decoration: none;
  color: var(--text-secondary); transition: color .2s;
}
.tab-item.active { color: #764ba2; }
.tab-item svg { width: 24px; height: 24px; }
.tab-label { font-size: 11px; font-weight: 700; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="profile-header">
  <a href="ajustes.html" class="settings-btn">⚙️</a>
</div>

<!-- PROFILE INFO -->
<div class="profile-info">
  <div class="profile-avatar">E</div>
  <div class="profile-name">Eric</div>
  <div class="profile-sub">Sujeto #48,291</div>
</div>

<!-- CONTENT -->
<div class="profile-content">

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card accent">
      <div class="stat-value">42</div>
      <div class="stat-label">Índice de rareza</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">🔥 7</div>
      <div class="stat-label">Racha actual</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">34</div>
      <div class="stat-label">Preguntas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">89%</div>
      <div class="stat-label">Participación</div>
    </div>
  </div>

  <!-- RADAR CHART -->
  <div class="radar-card">
    <div class="radar-title">🗺 Mapa de rareza</div>
    <div class="radar-wrap">

    </div>
  </div>

  <!-- INSIGNIAS -->
  <div class="badges-card">
    <div class="badges-title">🏅 Insignias</div>
    <div class="badges-grid">
      <div class="badge-item" style="background:var(--mint-light);">
        <div class="badge-emoji">🧪</div>
        <div class="badge-name">Novato</div>
      </div>
      <div class="badge-item" style="background:var(--lilac-light);">
        <div class="badge-emoji">🔥</div>
        <div class="badge-name">7 días</div>
      </div>
      <div class="badge-item" style="background:var(--yellow-light);">
        <div class="badge-emoji">🦄</div>
        <div class="badge-name">Ultra raro</div>
      </div>
      <div class="badge-item locked">
        <div class="badge-emoji">🏆</div>
        <div class="badge-name">30 días</div>
      </div>
      <div class="badge-item locked">
        <div class="badge-emoji">👑</div>
        <div class="badge-name">Top 1%</div>
      </div>
    </div>
  </div>

</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <a href="index.html" class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    <span class="tab-label">Inicio</span>
  </a>
  <a href="amigos.html" class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>

</nav>

<script>
// RADAR CHART
(function() {
  const canvas = document.getElementById('radarCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const maxR = 100;
  const labels = ['Hábitos', 'Comida', 'Social', 'Cultura', 'Random', 'Opinión'];
  const values = [0.75, 0.6, 0.85, 0.45, 0.9, 0.7];
  const n = labels.length;

  function angle(i) { return (Math.PI * 2 * i / n) - Math.PI / 2; }
  function point(i, r) {
    const a = angle(i);
    return [cx + Math.cos(a) * r, cy + Math.sin(a) * r];
  }

  // Grid rings
  ctx.strokeStyle = '#E8E8EE';
  ctx.lineWidth = 1;
  for (let ring = 1; ring <= 4; ring++) {
    const r = maxR * ring / 4;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const [x, y] = point(i % n, r);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Axis lines
  ctx.strokeStyle = '#E0E0E8';
  for (let i = 0; i < n; i++) {
    const [x, y] = point(i, maxR);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const [x, y] = point(i % n, maxR * values[i % n]);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(195, 177, 225, 0.35)';
  ctx.fill();
  ctx.strokeStyle = '#764ba2';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Data points
  for (let i = 0; i < n; i++) {
    const [x, y] = point(i, maxR * values[i]);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#764ba2';
    ctx.fill();
  }

  // Labels
  ctx.fillStyle = '#1A1A2E';
  ctx.font = '600 12px "Plus Jakarta Sans", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const [x, y] = point(i, maxR + 22);
    ctx.fillText(labels[i], x, y);
  }
})();
</script>
</body>
