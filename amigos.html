<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monos — Amigos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --mint: #A8E6CF;
  --mint-light: #D4F5E6;
  --lilac: #C3B1E1;
  --lilac-light: #E8DEFF;
  --yellow: #FFEAA7;
  --yellow-light: #FFF8DC;
  --pink: #FFB7C5;
  --pink-light: #FFE0E8;
  --orange: #FFD4A8;
  --bg: #FAFBFC;
  --card: #FFFFFF;
  --text: #1A1A2E;
  --text-secondary: #6B7280;
  --border: #F0F0F5;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --radius: 20px;
  --radius-sm: 14px;
  --tab-height: 72px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  width: 100vw;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: var(--tab-height);
  overflow-x: hidden;
}

/* ===== AVATAR ===== */
.avatar-section {
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 24px 0;
}
.avatar-wrap {
  position: relative; width: 64px; height: 64px; margin-bottom: 16px;
}
.avatar-circle {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 800; color: #fff;
}
.avatar-settings {
  position: absolute; bottom: -2px; right: -2px;
  width: 24px; height: 24px; border-radius: 50%;
  background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer;
}
.tagline {
  font-size: 17px; font-weight: 700; text-align: center;
  color: var(--text); margin-bottom: 28px;
}

/* ===== INVITE CARD ===== */
.invite-card {
  background: var(--card); border-radius: var(--radius);
  padding: 28px 24px; box-shadow: var(--shadow);
  margin: 0 24px 16px; text-align: center;
}
.invite-card p {
  font-size: 16px; font-weight: 600; line-height: 1.5;
  margin-bottom: 20px; color: var(--text);
}
.btn-invite {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; width: 100%; padding: 16px;
  border: none; border-radius: 16px;
  font-size: 17px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 4px 20px rgba(102,126,234,0.4);
  cursor: pointer; font-family: inherit;
  transition: transform .15s;
}
.btn-invite:active { transform: scale(0.97); }

/* ===== GROUP ID PILL ===== */
.group-pill-wrap { display: flex; justify-content: center; margin: 0 24px 28px; }
.group-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px; border-radius: 30px;
  background: var(--border); font-size: 14px; font-weight: 600;
  color: var(--text-secondary); cursor: pointer;
  transition: background .2s;
  position: relative;
}
.group-pill:active { background: #e4e4ea; }
.copied-toast {
  position: absolute; top: -32px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; font-size: 12px; font-weight: 700;
  padding: 5px 12px; border-radius: 8px; opacity: 0;
  transition: opacity .25s; pointer-events: none;
}
.copied-toast.show { opacity: 1; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center; padding: 24px 24px 32px;
}
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state .title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.empty-state .subtitle { font-size: 14px; color: var(--text-secondary); font-weight: 500; }

/* ===== TAB BAR ===== */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--tab-height);
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; z-index: 80;
  padding-bottom: env(safe-area-inset-bottom);
  max-width: 430px; margin: 0 auto;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; text-decoration: none;
  color: var(--text-secondary); transition: color .2s;
}
.tab-item.active { color: #764ba2; }
.tab-item svg { width: 24px; height: 24px; }
.tab-label { font-size: 11px; font-weight: 700; }
</style>
</head>
<body>

<!-- AVATAR -->
<div class="avatar-section">
  <a href="amigos-full.html" class="avatar-wrap" style="text-decoration:none;">
    <div class="avatar-circle">E</div>
    <div class="avatar-settings">⚙️</div>
  </a>
  <div class="tagline">Monos es para ti y tu manada.</div>
</div>

<!-- INVITE CARD -->
<div class="invite-card">
  <p>Agrega monos a tu grupo para compartir las preguntas diarias ✌️</p>
  <button class="btn-invite" onclick="inviteFriends()">＋ Invitar a amigos</button>
</div>

<!-- GROUP ID -->
<div class="group-pill-wrap">
  <div class="group-pill" onclick="copyGroupId(this)">
    📋 ID de grupo: MONO-7X92
    <span class="copied-toast" id="copiedToast">¡Copiado!</span>
  </div>
</div>

<!-- EMPTY STATE -->
<div class="empty-state">
  <div class="emoji">🐒</div>
  <div class="title">Aún no hay monos en tu grupo</div>
  <div class="subtitle">Invita a tus amigos para comparar respuestas</div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <a href="index.html" class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    <span class="tab-label">Inicio</span>
  </a>
  <a href="amigos.html" class="tab-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    <span class="tab-label">Amigos</span>
  </a>
  <a href="perfil.html" class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="tab-label">Perfil</span>
  </a>
  <a href="logros.html" class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
    <span class="tab-label">Logros</span>
  </a>
</nav>

<script>
function inviteFriends() {
  if (navigator.share) {
    navigator.share({
      title: 'Monos',
      text: 'Únete a mi grupo en Monos',
      url: 'https://monos.app/join/MONO-7X92'
    }).catch(() => {});
  } else {
    alert('Comparte este enlace: https://monos.app/join/MONO-7X92');
  }
}

function copyGroupId(el) {
  navigator.clipboard.writeText('MONO-7X92').then(() => {
    const toast = document.getElementById('copiedToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }).catch(() => {
    alert('MONO-7X92');
  });
}
</script>
</body>
</html>
